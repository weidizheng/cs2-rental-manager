<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CS2 出租订单同步</title>
    <style>
      body { width: 320px; margin: 0; padding: 16px; font: 13px/1.5 system-ui, sans-serif; color: #1f2937; }
      h1 { margin: 0 0 8px; font-size: 16px; }
      p { margin: 8px 0; color: #4b5563; }
      label { display: block; margin-top: 12px; font-weight: 600; }
      input { box-sizing: border-box; width: 100%; margin-top: 5px; padding: 8px; border: 1px solid #9ca3af; border-radius: 5px; }
      button { width: 100%; margin-top: 10px; padding: 8px; border: 0; border-radius: 5px; background: #2563eb; color: white; cursor: pointer; }
      button.secondary { background: #4b5563; }
      #status { min-height: 20px; margin-top: 10px; color: #374151; word-break: break-word; }
      .note { font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>CS2 出租订单同步</h1>
    <p>仅在本地程序请求后读取已打开的 C5/ECO/IGXE 订单页。不会读取 Cookie、密码，也不会处理验证码。</p>
    <label for="token">配对令牌</label>
    <input id="token" type="password" autocomplete="off" placeholder="从桌面程序复制">
    <button id="save">保存令牌</button>
    <button id="sync" class="secondary">立即检查同步请求</button>
    <div id="status" role="status"></div>
    <p class="note">若页面显示安全验证，请直接在该浏览器标签页人工完成，然后回到桌面程序再次点击同步。</p>
    <script src="popup.js"></script>
  </body>
</html>
